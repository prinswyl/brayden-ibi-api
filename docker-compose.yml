services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/brayden_ibi
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app       # hot-reload in dev (remove in prod)
      - ./migrations:/app/migrations
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brayden_ibi
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brayden_ibi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brayden_ibi_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data    # in-memory for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brayden_ibi_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
